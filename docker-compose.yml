services:
  invest-ingest:
    build: ./ingest
    container_name: invest-ingest
    restart: unless-stopped
    env_file: .env
    environment:
      INGEST_INTERVAL: "3600"

  invest-api:
    build: ./api
    container_name: invest-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8100:8100"
