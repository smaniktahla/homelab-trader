services:
  invest-ingest:
    build:
      context: .
      dockerfile: ingest/Dockerfile
    container_name: invest-ingest
    restart: unless-stopped
    env_file: .env
    environment:
      INGEST_INTERVAL: "3600"

  invest-api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: invest-api
    labels:
      kuma.invest-api.http.name: "Invest API"
      kuma.invest-api.http.url: "http://10.10.10.13:8100/docs"
    restart: unless-stopped
    env_file: .env
    ports:
      - "8100:8100"
